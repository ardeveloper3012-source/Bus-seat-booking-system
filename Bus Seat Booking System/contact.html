<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="icon" href="images/favlogo.png" type="image/png" sizes="50x50">
  <link rel="icon" href="images/favlogo.png" type="image/png" sizes="25x25">
  <link rel="apple-touch-icon" href="images/favlogo.png">
  <link rel="stylesheet" href="css/about.css">
  <link rel="stylesheet" href="css/contact.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="js/contact.js" defer></script>
</head>
<body>
  <div class="about-section">
    <div class="back-button-container">
      <a href="javascript:history.back()" class="back-button" title="Go Back">&#8592;</a>
      <h1 class="about-heading">Contact Us</h1>
    </div>
    
    <!-- Contact Icons Only -->
    <div class="contact-icons-wrapper">
      <div class="contact-icon-item">
        <div class="contact-icon-circle">
          <i class="fas fa-phone"></i>
        </div>
      </div>
      
      <div class="contact-icon-item">
        <div class="contact-icon-circle">
          <i class="fas fa-map-marker-alt"></i>
        </div>
      </div>
      
      <div class="contact-icon-item">
        <div class="contact-icon-circle">
          <i class="fas fa-envelope"></i>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="contact-form-wrapper">
      <form id="contactForm">
        <div class="form-group-contact">
          <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>
        </div>
        
        <div class="form-group-contact">
          <input type="email" id="emailAddress" name="emailAddress" placeholder="Email Address" required>
        </div>
        
        <div class="form-group-contact">
          <textarea id="message" name="message" placeholder="Message" rows="5" required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>
  </div>
</body>
</html>
